# Правила конвейера (аналог sm.json из dmtools). Исполнитель — ВЕРХНИЙ уровень
# /qa-loop (не субагент; docs/03 §1, находка репетиции 2026-07-04): идёт сверху вниз,
# берёт первый подходящий артефакт БЕЗ лока и не в Blocked/wip, ставит лок, диспатчит
# воркера глубины 1 синхронным Task, снимает лок. Порядок = приоритет: сперва разбор
# текущих прогонов и багов, потом новая автоматизация и планирование.
# qa-orchestrator — только read-only планировщик для /qa-loop --dry-run.
# v2 (2026-07-03): pre_steps (событийный контур тёмной фабрики) + правила реакции на
# действия разработчика D1–D12 — спецификация в docs/06-dark-factory.md.
# v3 (2026-07-07): диспетчеризация перенесена на верхний уровень (A1 из docs/09).
version: 3
# Дефолт на проход; числовой аргумент команды (`/qa-loop 6`) переопределяет
# его на один проход, НЕ правя этот файл (SKILL.md qa-loop, 2026-07-16).
max_triggered_workflows: 3

# Статусы-паузы: артефакты в них всегда пропускаются (точки вмешательства человека)
skip_statuses: [Blocked]
skip_locks: [wip]

# Порядок выбора артефакта внутри правила: лексикографический по пути файла
# (как обходит rglob/Grep). Зафиксировано 2026-07-07 по вопросу планировщика.

# Шаг 0 каждого прохода — выполняет верхний уровень /qa-loop ДО правил запуском
# скриптов (docs/06 §1). Все 4 шага реализованы и покрыты тестами (scripts/tests/).
pre_steps:
  - name: stale_locks     # scripts/stale_locks.py: lock старше sla.lock_stale без завершения в логе → снять, залогировать
  - name: sla_sweep       # scripts/sla_sweep.py: просрочки по state/sla.yaml → state/escalations.md + метка attention
  - name: board_inbound   # scripts/board_inbound.py: переходы/комментарии человека на борде → артефакты (docs/06 §3, docs/07)
  - name: build_watch     # scripts/build_watch.py: git fetch app-under-test; новые коммиты → сборка APK → app-under-test.yaml (timeout 600с+)

rules:
  - name: "Новая сборка → smoke, затем regression"
    when: "state/app-under-test.yaml изменился (versionCode/hash != последнего прогона)"
    dispatch: test-runner
    args: { suite: [smoke, regression], mode: replay, regression_selection: impact }
    # D1 (Этап 4 п.5, шаг 2, 2026-07-14): regression — по impact-селекции.
    # test-runner зовёт scripts/impact_select.py (карта state/impact-map.yaml);
    # «FULL REGRESSION» (wide-impact/unknown-файл/недоступный диапазон) → полный
    # набор; иначе — automated_by затронутых областей. smoke всегда полный.
    # Fail-safe: любой сбой селекции = full (протухшая карта не сужает прогон
    # молча). Аудит — поле selection в run-артефакте (schemas/run.schema.yaml).

  - name: "Разобрать падения прогона"
    when: "run.status == NeedsTriage"
    dispatch: failure-analyst
    # Вердикты: APP_BUG | TEST_BUG | SITE_CHANGED | APP_CHANGED | ENV_ISSUE | FLAKY
    # APP_CHANGED (docs/06 D9): поведение изменено коммитом приложения без тикета —
    # analyst сверяется с git log app-under-test между сборками.

  - name: "Завести баг по APP_BUG"
    when: "run содержит вердикт APP_BUG без linked_bug"
    dispatch: bug-reporter

  - name: "Ответить на вопрос разработчика в баге"   # docs/06 D6
    when: "bug имеет реплику с awaiting: qa в ## Обсуждение"
    dispatch: bug-reporter
    args: { role: responder }

  - name: "Починить тест по TEST_BUG/SITE_CHANGED/APP_CHANGED"
    when: "падение с вердиктом TEST_BUG, SITE_CHANGED или APP_CHANGED без resolution"
    dispatch: test-maintainer

  - name: "Верифицировать исправленный баг"          # docs/06 D1
    when: "bug.status == Fixed И (есть сборка новее bug.found_in ИЛИ bug.type == test_debt —
      долг фреймворка не ждёт сборку приложения, B4)"
    dispatch: fix-verifier

  - name: "Перепроверить отклонённый баг"            # docs/06 D4
    when: "bug.status == Rejected И нет строки верификации на актуальной сборке"
    dispatch: fix-verifier
    args: { mode: recheck-rejected }
    # Воспроизвёлся → доказательства в ## Обсуждение, awaiting: dev, dispute_count+1
    # (при достижении sla.reopened_pingpong — Blocked + эскалация).
    # Не воспроизвёлся → принять Rejected; ложноположительный тест → test-maintainer.

  - name: "Согласовать тесты с задуманным поведением"  # docs/06 D5
    when: "bug.status == Intended И связанные TC/тесты не обновлены"
    dispatch: test-maintainer

  - name: "Перепроверить репро старых багов на новой сборке"  # docs/06 D3
    when: "после smoke/regression на новой сборке есть Open/Reopened blocker|critical с
      last_seen_in < текущей сборки, ИЛИ known_issue: true любой severity (D14, B2 —
      «не ухудшился» проверяем на каждой сборке независимо от severity)"
    dispatch: fix-verifier
    args: { mode: still-repro }

  - name: "Починить автотест в карантине/на обслуживании"   # B3, приоритет ВЫШЕ новой автоматизации
    when: "test-case.automation_status == quarantined|needs_maintenance"
    dispatch: test-maintainer
    # Выход quarantined→active только через 3 зелёных прогона подряд (матрица
    # transitions.yaml, машина automation). Просроченный карантин ловит sla_sweep
    # (quarantine_expired) — правило не даёт долгу копиться молча.

  - name: "Устранить test debt"                             # B4
    when: "bug.type == test_debt И status == Open|Reopened"
    dispatch: test-maintainer
    # test-maintainer чинит долг фреймворка (flaky/slow/фикстуры/локаторы) и переводит
    # Open→Fixed сам (guard-переход в матрице); верификация — общим правилом D1.

  - name: "Доработать автотест по ревью"                    # F1, выше нового ревью и новой автоматизации
    when: "test-case.review == changes_requested"
    dispatch: test-automator
    # Автор отрабатывает замечания из раздела «## Ревью автотеста», удаляет review →
    # кейс возвращается на повторное ревью следующим правилом.

  - name: "Ревью нового автотеста"                          # F1
    when: "test-case.status == Approved И automated_by заполнен И нет review"
    dispatch: test-reviewer
    # Гейт: Approved→Automated переводит ТОЛЬКО test-reviewer (матрица transitions.yaml).
    # Он же ставит automation_status: active (B3).

  - name: "Автоматизировать Approved-кейс"
    when: "test-case.status == Approved И пусто automated_by И кейс НЕ покрыт
      Open|Reopened test_debt-багом (bugs/*.md: test_cases содержит его TC-id)"
    dispatch: test-automator
    # Guard на входе (2026-07-09, класс AT-BUG-004/005/006 — блокер жил прозой
    # в «Заметках для автоматизации», конвейер его не видел): перед диспатчем
    # верхний уровень (а) сверяет кейс с Open|Reopened test_debt-багами по
    # test_cases (механически, Grep по bugs/); (б) грепает «Заметки для
    # автоматизации» кейса на маркеры блокера («не поддержан»,
    # «не автоматизируется штатно», «эскалировать как техническую задачу»,
    # «нет записи», «нет фикстуры»). Маркер есть, покрывающего бага нет →
    # НЕ диспатчить вслепую: завести test_debt-баг (+ defect_found в
    # routing-журнал), кейс возьмётся после устранения долга (B4).
    # Проверка (б) — детектор отказа обязанности test-designer заводить
    # test_debt у источника (промпт test-designer, шаг 4 воркфлоу).
    # Внешний детектор самого guard'а: реактивный путь триажа (холостой
    # диспатч вскрывается падением) + чек еженедельной калибровки (OS-репо).

  - name: "Спроектировать кейсы для области без покрытия"
    when: "в §9 docs/01-test-strategy.md есть ПУНКТ списка областей, помеченный меткой needs-design"
    dispatch: test-designer
    # Метка — только у пунктов P0/P1-списков §9 (конвенция в начале §9).
    # Упоминания подстроки needs-design вне пунктов (заголовок §9, текст
    # конвенции, исторические комментарии §10) — НЕ триггер.
    # test-designer, закрыв область, снимает метку в том же ходе; если
    # диспатчнут на уже покрытую область — снимает метку и возвращает no-op.

  - name: "Обновить стратегию при изменении приложения"
    when: "app-under-test/PROJECT.md изменился с последнего анализа ИЛИ появился вердикт APP_CHANGED"
    dispatch: test-strategist

  - name: "Исполнить exploratory charter"     # P7 docs/10, Этап 4 п.11 шаг 2 (2026-07-14)
    when: "charter.status == Planned (exploratory-charters/CH-*.md)"
    dispatch: exploratory-tester
    # Заведение charter'а — событийное, за Lead/человеком (крупная фича,
    # APP_CHANGED, перед релизом, кластер багов — конвенции в
    # exploratory-charters/README.md); правило только исполняет заведённое.
    # Ниже прочих правил намеренно: исследование не крадёт очередь у триажа
    # и автоматизации. Таймбокс — в frontmatter charter'а.

  # [план] Включить, когда canary-suite реально существует (сейчас в framework/tests
  # нет canary-тестов — находка планировщика 2026-07-07; иначе ежедневный холостой
  # диспатч test-runner в стену). Создание canary-suite — Этап 3 docs/09.
