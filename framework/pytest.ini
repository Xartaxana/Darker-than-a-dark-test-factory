[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -ra
    --strict-markers
    --alluredir=allure-results
    --clean-alluredir
    --reruns 1
    --only-rerun ReadTimeoutError|MaxRetryError
markers =
    p0: smoke — гоняется на каждой сборке
    p1: регрессия
    p2: расширенное покрытие
    p3: косметика
    live: требует живого AO3
    replay: требует replay-прокси
    quarantine: нестабильный тест, вне гейта
