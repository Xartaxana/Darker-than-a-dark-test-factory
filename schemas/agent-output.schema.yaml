# Схема machine-readable результата агента (F2, docs/09 Этап 2).
#
# КОНТРАКТ: каждый воркер, диспатчнутый /qa-loop (или /run-suite, /triage),
# завершает свой ответ fenced-блоком ```yaml с одним top-level ключом agent_output.
# Верхний уровень парсит его (scripts/agent_output.py), пишет result в
# orchestrator-log и НЕ разбирает свободный текст. Блока нет / блок битый →
# исход прохода по артефакту считается degraded (текст читает уже человек).
version: 1
required: [agent, artifact, result]
fields:
  agent:    # имя воркера. Источник истины перечня — агенты, диспатчащиеся
            # правилами state/rules.yaml (НЕ actors.groups.factory в
            # transitions.yaml: там нет exploratory-tester — charter-машины
            # в transitions нет, его статусы держит charter.schema).
            # Рассинхрон enum с rules.yaml ловится сам: воркер без валидного
            # значения подставляет ложное имя (прецедент CH-001..003:
            # exploratory-tester писал test-strategist) — атрибуция
            # orchestrator-log врёт молча. Правишь rules.yaml — сверь enum.
    enum: [test-strategist, test-designer, test-automator, test-runner,
           failure-analyst, bug-reporter, fix-verifier, test-maintainer,
           test-reviewer, exploratory-tester]
  artifact: {}          # id или путь главного артефакта ("—" если нет)
  result:
    enum: [success, blocked, degraded, failed]
    # success  — чек-лист готовности пройден, статусы переведены
    # blocked  — артефакт переведён в Blocked (эскалация записана)
    # degraded — часть шагов пропущена (нет разрешения/окружения), причина в summary
    # failed   — работа не выполнена, статусы НЕ менялись
  summary: {}           # 1–2 строки для лога; НЕ замена ## Обсуждение/отчётов
  changed_files: {}     # список путей, которые агент менял
  evidence: {}          # список путей к доказательствам (логи, скриншоты, прогоны)
  next_rules: {}        # подсказки диспетчеру: какие правила проверить следующим проходом
  escalations: {}       # список строк, УЖЕ записанных агентом в state/escalations.md
