# Схема frontmatter отчёта о прогоне (G3, docs/09).
type: run
id_pattern: "^RUN-[A-Za-z0-9-]+$"
required: [id, suite, status]
fields:
  suite:  { enum: [smoke, regression, canary, verification] }
  mode:   { enum: [live, replay] }
  status: { enum: [NeedsTriage, Triaged, Closed, Blocked] }
  updated: { pattern: "^\\d{4}-\\d{2}-\\d{2}[T ][\\d:.+]+Z?$" }
  status_since: { pattern: "^\\d{4}-\\d{2}-\\d{2}[T ][\\d:.+]+Z?$" }
  lock:   { pattern: "^$|^wip$|^[A-Za-z0-9_-]+:\\d{4}-\\d{2}-\\d{2}T[\\d:.]+Z?$" }
  app_version: {}
  totals: {}     # {passed, failed, skipped} из шаблона run-report
  allure: {}     # путь к allure-results прогона
  # Пер-TC результаты (Этап 4 п.12, находка r10-coverage-map): {TC-xxx: passed|
  # failed|skipped|quarantined}, заполняет test-runner из allure-results
  # (@allure.id теста == id кейса). Опционален для прогонов до 2026-07-14;
  # отсутствие в НОВОМ прогоне ловит coverage_map (явная строка деградации).
  tc_results: {}
  # D1 (Этап 4 п.5, шаг 2): режим отбора regression — full | impact,
  # + диапазон коммитов селекции; пишет test-runner. Аудит селекции — по run.
  selection: {}
  # B5 (docs/09 Этап 2): причина простоя в Blocked; см. schemas/bug.schema.yaml.
  blocked_reason: { enum: [environment, missing_fixture, product_decision, dev_answer, permissions] }
