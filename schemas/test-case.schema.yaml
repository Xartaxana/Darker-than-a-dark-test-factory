# Схема frontmatter тест-кейса (G3, docs/09). Проверяется scripts/validate_frontmatter.py
# в preflight /qa-loop: битые артефакты ловим ДО диспетчеризации, а не в момент падения агента.
type: test-case
id_pattern: "^TC-\\d{3,}$"
required: [id, title, area, priority, status, updated]
fields:
  priority: { enum: [P0, P1, P2, P3] }
  status:   { enum: [Draft, Review, Approved, Automated, Blocked] }
  updated:  { pattern: "^\\d{4}-\\d{2}-\\d{2}[T ][\\d:.+]+Z?$" }
  status_since: { pattern: "^\\d{4}-\\d{2}-\\d{2}[T ][\\d:.+]+Z?$" }
  lock:     { pattern: "^$|^wip$|^[A-Za-z0-9_-]+:\\d{4}-\\d{2}-\\d{2}T[\\d:.]+Z?$" }
  # C4-ретрофит 2026-07-18 (test-maintainer, попутно с TC-027/047/048/049): канон —
  # пустая строка (ещё не автоматизирован) ИЛИ `framework/tests/<файл>::<функция>`
  # (тот же стиль альтернации `^$|...`, что у `lock` выше). Сверено по всем 65
  # существующим кейсам (`grep automated_by test-cases/`) — уже все конформны,
  # pattern фиксирует инвариант на будущее, не бэкфиллит.
  automated_by: { pattern: "^$|^framework/tests/.+::.+$" }     # путь к тесту; обязателен содержательно только при status: Automated
  area: {}
  risk: {}
  requirements: {}
  # trace-matrix диспатч 1 (2026-07-17): список id из docs/feature-registry.yaml.
  # Кросс-файловая проверка (id ∉ реестра → ERROR) — validate_frontmatter.py
  # check_feature_ids; отсутствующее/пустое поле — WARNING, не ERROR (backfill
  # данных — диспатч 2, отдельная приёмка).
  features: {}
  # B5 (docs/09 Этап 2): причина простоя в Blocked; см. schemas/bug.schema.yaml.
  blocked_reason: { enum: [environment, missing_fixture, product_decision, dev_answer, permissions] }
  # B3 (docs/09 Этап 2): lifecycle АВТОТЕСТА — вторая статусная машина на том же
  # артефакте (machines.automation в schemas/transitions.yaml). Заполняется только
  # при status: Automated (test-automator ставит active при переводе); иное — WARN
  # валидатора. quarantined ОБЯЗАН нести quarantine_reason+quarantine_since (ERROR),
  # иначе SLA-надзор slа_sweep (правило quarantine_expired) слеп — карантин не
  # бывает бесконечным.
  automation_status: { enum: [active, quarantined, needs_maintenance, deprecated, retired] }
  # F1 (docs/09 Этап 2): гейт ревью нового автотеста. Кейс с заполненным automated_by
  # остаётся Approved, пока test-reviewer не переведёт в Automated. changes_requested
  # ставит ревьюер (замечания — в тело кейса), снимает test-automator после доработки.
  review: { enum: [changes_requested] }
  reviewed_by: {}
  reviewed_at: { pattern: "^\\d{4}-\\d{2}-\\d{2}[T ][\\d:.+]+Z?$" }
  quarantine_reason: {}
  quarantine_since: { pattern: "^\\d{4}-\\d{2}-\\d{2}[T ][\\d:.+]+Z?$" }
  quarantine_expiry: { pattern: "^\\d{4}-\\d{2}-\\d{2}[T ][\\d:.+]+Z?$" }
  quarantine_owner: {}   # кто отвечает за вывод из карантина (обычно test-maintainer)
  # red-probe-видимость (docs/09 п.10, введено 2026-07-17): ISO-таймстамп (полный,
  # как reviewed_at — голая дата не пройдёт паттерн), когда автотест
  # доказал умение падать (мутационная проверка F1 п.7 test-reviewer, либо ретрофит-
  # режим того же агента). Отсутствие/пустота при status: Automated И
  # automation_status: active = проба не делалась — сигнал долга для правила
  # rules.yaml "Красная проба существующего автотеста (ретрофит red_probe)".
  red_probe: { pattern: "^\\d{4}-\\d{2}-\\d{2}[T ][\\d:.+]+Z?$" }
