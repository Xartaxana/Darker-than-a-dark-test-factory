  # (решение по docs/09 Фаза 2 — хвост дробления browse-tabs-lifecycle). Это
  # отдельное наблюдаемо различимое поведение: тап по НЕактивному чипу делает эту
  # вкладку активной, показываемый контент WebView переключается на неё, индикатор
  # активности перемещается (switchTab также сбрасывает _activeScrollY в 0, стр.292).
  # Обработчик тапа: TabStrip.kt clickable(onTap) стр.108 → onSelectTab(index) стр.61
  # → MainActivity.kt:410 browserViewModel.switchTab(it). НЕ покрывается смежной
  # browse-tabstrip-indicators (та — чисто ВИЗУАЛЬНАЯ индикация активного чипа +
  # свайп-close + кнопка New tab, не сам акт переключения) и не покрыто ни одним из
  # 5 кейсов lifecycle как основной Then: TC-022/TC-023 держат активную вкладку лишь
