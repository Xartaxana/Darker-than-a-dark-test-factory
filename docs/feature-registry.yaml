# Реестр фич приложения (docs/09 §5.2 не нарушается — это рукописные ОПРЕДЕЛЕНИЯ
# фич, что существует в app-under-test/, не coverage-числа; покрытие остаётся
# генерируемой проекцией scripts/coverage_map.py из frontmatter test-cases/).
#
# Назначение: закрывает дыру, которую §5.2-проекция физически не может
# показать — фичу с НУЛЁМ кейсов (coverage_map.py читает только существующие
# test-cases/**, реестр списков кейсов НЕ содержит и не ссылается на них).
#
# Владелец: test-strategist при переинвентаризации (полная привязка триггера —
# state/rules.yaml when-условие на протухание — часть 5 механизма
# trace-matrix, вне скоупа диспатча 1; пока переинвентаризация ручная/по
# сигналу еженедельной калибровки). До части 5 обновляется вручную при
# заметном изменении приложения — сверить с кодом, обновить
# inventoried_at_commit, дельту отразить здесь.
#
# Верификация записей (builder, диспатч 1, 2026-07-17): каждая запись сверена
# с app-under-test/ по source — файл существует и поведение в нём читается
# (не unit-тестами, чтением реализации). Не подтверждённые построчно записи
# помечены явно в отчёте диспатча, не выкинуты и не выдуманы.
#
# Гранулярность: фича = проверяемое пользовательское поведение (не файл, не
# функция) — см. спека trace-matrix v2 §1a.

